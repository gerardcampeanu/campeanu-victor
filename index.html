<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Victor Campeanu</title>
    <meta name="description" content="A simple personal site for Victor Campeanu.">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="site-shell">
      <p class="eyebrow">Victor's site</p>
      <h1>Victor Campeanu</h1>
      <p>
        A small personal website for Victor. This page is ready for photos,
        projects, stories, and anything else Victor wants to share.
      </p>
      <a id="hub-link" href="http://campeanu.me/">Back to family hub</a>
    </main>
    <script>
      const hubLink = document.getElementById("hub-link");
      if (
        window.location.protocol === "file:" ||
        ["localhost", "127.0.0.1"].includes(window.location.hostname)
      ) {
        hubLink.href = "http://localhost:4174/";
      }
    </script>
  </body>
</html>
